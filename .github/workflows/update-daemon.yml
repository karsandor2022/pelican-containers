name: Update Wings Image

on:
  workflow_dispatch:
env:
    WINGS_PROJECT_NAME: pelican-wings
jobs:
  build_push_wings:
    name: Build and Push Wings Container
    runs-on: ubuntu-latest
    steps:
    - name: Setup repo
      uses: actions/checkout@v4

    - name: Read Version
      id: read_version
      run: |
        echo "version=$(grep -Po "WINGS_VERSION=\K[^ ]+" ./manifest/version.txt)" >> $GITHUB_OUTPUT
        
    - name: Set up QEMU
      uses: docker/setup-qemu-action@v3

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Login to DockerHub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Build and push
      uses: docker/build-push-action@v5
      with:
        context: ./manifest/images/wings
        file: ./manifest/images/wings/Dockerfile
        platforms: linux/amd64
        push: true
        build-args: VERSION=${{ steps.read_version.outputs.version }}
        tags: |
          "${{ secrets.DOCKERHUB_USERNAME }}/${{ env.WINGS_PROJECT_NAME }}:latest"
          "${{ secrets.DOCKERHUB_USERNAME }}/${{ env.WINGS_PROJECT_NAME }}:${{ steps.read_version.outputs.version }}"
