name: "Check Online Version"
on:
  workflow_dispatch:
  schedule:
  - cron: "0 0 * * *"
env:
  PANEL_PROJECT_NAME: pelican-panel
  WINGS_PROJECT_NAME: pelican-wings
jobs:
  get_versions:
    name: Get Versions
    runs-on: ubuntu-latest
    outputs:
      current_panel_version: ${{ steps.panel_docker_version.outputs.version }}
      current_wings_version: ${{ steps.wings_docker_version.outputs.version }}
      latest_panel_version: ${{ steps.latest_versions.outputs.panel_version }}
      latest_wings_version: ${{ steps.latest_versions.outputs.wings_version }}
    steps:
    - name: Get Current Release
      id: latest_versions
      run: |
        curl -s "https://api.github.com/repos/pelican-dev/panel/releases/latest" \
          -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" | jq -r '.tag_name' > /tmp/panel_ver &
        curl -s "https://api.github.com/repos/pelican-dev/wings/releases/latest" \
          -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" | jq -r '.tag_name' > /tmp/wings_ver &
        wait
        echo "panel_version=$(cat /tmp/panel_ver)" >> $GITHUB_OUTPUT
        echo "wings_version=$(cat /tmp/wings_ver)" >> $GITHUB_OUTPUT

    - name: Get Panel Docker version
      uses: luoqiz/docker-images-latest-version@master
      id: panel_docker_version
      with:
        image: ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.PANEL_PROJECT_NAME }}
    - name: Get Wings Docker version
      uses: luoqiz/docker-images-latest-version@master
      id: wings_docker_version
      with:
        image: ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.WINGS_PROJECT_NAME }}

  update-version-txt:
    name: Update version.txt
    runs-on: ubuntu-latest
    needs: get_versions
    if: needs.get_versions.outputs.latest_panel_version != needs.get_versions.outputs.current_panel_version || needs.get_versions.outputs.latest_wings_version != needs.get_versions.outputs.current_wings_version
    steps:
    - uses: actions/checkout@v4
    - run: |
        git config user.name github-actions
        git config user.email github-actions@github.com
        echo -e "PANEL_VERSION=${{ needs.get_versions.outputs.latest_panel_version }}\nWINGS_VERSION=${{ needs.get_versions.outputs.latest_wings_version }}" > ./manifest/version.txt
        git commit -a -m "updated version.txt."
        git push

  request_wings_build:
    name: Request Wings Build
    runs-on: ubuntu-latest
    needs:
    - get_versions
    - update-version-txt
    if: needs.update-version-txt.result == 'success' && needs.get_versions.outputs.latest_wings_version != needs.get_versions.outputs.current_wings_version
    steps:
    - uses: convictional/trigger-workflow-and-wait@v1.3.0
      with:
        owner: ${{ github.repository_owner }}
        repo: pelican-containers
        github_token: ${{ secrets.WORKFLOW_TOKEN }}
        workflow_file_name: update-daemon.yml
        ref: master
        trigger_workflow: true
        wait_workflow: false

  request_panel_build:
    name: Request Panel Build
    runs-on: ubuntu-latest
    needs:
    - get_versions
    - update-version-txt
    if: needs.update-version-txt.result == 'success' && needs.get_versions.outputs.latest_panel_version != needs.get_versions.outputs.current_panel_version
    steps:
    - uses: convictional/trigger-workflow-and-wait@v1.3.0
      with:
        owner: ${{ github.repository_owner }}
        repo: pelican-containers
        github_token: ${{ secrets.WORKFLOW_TOKEN }}
        workflow_file_name: update-panel.yml
        ref: master
        trigger_workflow: true
        wait_workflow: false
